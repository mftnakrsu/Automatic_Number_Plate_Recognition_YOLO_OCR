name: Bug report
description: Something doesn't work the way it should.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in
        everything you can — concrete repro steps + traceback make the
        difference between a 10-minute fix and a 3-day investigation.
  - type: input
    id: version
    attributes:
      label: anpr-pipeline version
      description: Output of `anpr version` (or `pip show anpr-pipeline`).
      placeholder: "0.2.3"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.13.1"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / arch
      placeholder: "Ubuntu 24.04 x86_64 / macOS 14.6 arm64 / Docker"
    validations:
      required: true
  - type: dropdown
    id: install
    attributes:
      label: Install method
      options:
        - pip install anpr-pipeline
        - docker compose
        - uv sync from source
        - other
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / traceback
      description: Full traceback if applicable. Set ANPR_LOG_LEVEL=DEBUG if you can.
      render: shell
  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues for duplicates.
          required: true
        - label: I'm on the latest released version (or HEAD).
