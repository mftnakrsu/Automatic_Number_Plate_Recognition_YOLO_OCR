name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  ANPR_PLATE_HMAC_PEPPER: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - name: Install dev deps
        run: uv sync --group dev
      - name: ruff check
        run: uv run ruff check src tests scripts
      - name: ruff format --check
        run: uv run ruff format --check src tests scripts

  type:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - name: Install all deps
        run: uv sync --all-extras --group dev
      - name: pyright
        run: uv run pyright src tests

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python }}
          cache-dependency-glob: "pyproject.toml"
      - name: Install all deps
        run: uv sync --all-extras --group dev
      - name: pytest
        run: |
          uv run pytest \
            --ignore=tests/integration/test_pipeline_real.py \
            --cov=anpr \
            --cov-report=xml \
            --cov-report=term-missing
      - name: Upload coverage
        if: matrix.python == '3.13'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  docker:
    runs-on: ubuntu-latest
    needs: [lint, type, test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: anpr:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke /health
        run: |
          set +e
          docker run -d --name anpr-ci -p 8000:8000 \
            -e ANPR_PLATE_HMAC_PEPPER="$ANPR_PLATE_HMAC_PEPPER" \
            anpr:ci

          ok=0
          for i in $(seq 1 90); do
            if curl -fsS http://localhost:8000/health >/dev/null 2>&1; then
              echo "Up after ${i}s"
              ok=1
              break
            fi
            if ! docker ps --filter name=anpr-ci --format '{{.Names}}' | grep -q anpr-ci; then
              echo "Container died:"
              docker logs anpr-ci 2>&1 | tail -100
              exit 1
            fi
            sleep 1
          done

          echo "--- container logs ---"
          docker logs anpr-ci 2>&1 | tail -100

          if [ "$ok" -ne 1 ]; then
            echo "ERROR: /health never responded"
            docker stop anpr-ci >/dev/null 2>&1
            exit 1
          fi

          echo "--- /health ---"
          curl -fsS http://localhost:8000/health || exit 1
          echo
          echo "--- /version ---"
          curl -fsS http://localhost:8000/version || exit 1
          echo
          docker stop anpr-ci >/dev/null 2>&1
