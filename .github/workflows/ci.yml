name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  ANPR_PLATE_HMAC_PEPPER: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - name: Install dev deps
        run: uv sync --group dev
      - name: ruff check
        run: uv run ruff check src tests scripts
      - name: ruff format --check
        run: uv run ruff format --check src tests scripts

  type:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - name: Install all deps
        run: uv sync --all-extras --group dev
      - name: pyright
        run: uv run pyright src tests

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python }}
          cache-dependency-glob: "pyproject.toml"
      - name: Install all deps
        run: uv sync --all-extras --group dev
      - name: pytest
        run: |
          uv run pytest \
            --ignore=tests/integration/test_pipeline_real.py \
            --cov=anpr \
            --cov-report=xml \
            --cov-report=term-missing
      - name: Upload coverage
        if: matrix.python == '3.13'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  docker:
    runs-on: ubuntu-latest
    needs: [lint, type, test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: anpr:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke /health
        run: |
          docker run --rm -d --name anpr-ci -p 8000:8000 \
            -e ANPR_PLATE_HMAC_PEPPER="$ANPR_PLATE_HMAC_PEPPER" \
            anpr:ci
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/health; then
              echo " up after ${i}s"; break
            fi
            sleep 1
          done
          curl -fsS http://localhost:8000/health
          curl -fsS http://localhost:8000/version
          docker logs anpr-ci | tail -50
          docker stop anpr-ci
